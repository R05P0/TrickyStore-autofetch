# Keybox Autofetch configuration
# Edit this file, then reboot (or tap the module's Action to re-run now).
# This file lives at /data/adb/keybox_autofetch/config.conf after install
# so your settings survive module updates.

# Source order (space separated). Known sources: yurikey  upstream  custom
# - yurikey  : https://github.com/Yurii0307/yurikey
# - upstream : KOWX712 Tricky-Addon keybox branch
# - custom   : your own URL (see CUSTOM_URL); may be raw XML or base64
SOURCES="yurikey upstream"

# Only used when 'custom' is listed in SOURCES.
CUSTOM_URL=""

# How often to check, in seconds. Default 12h. Minimum enforced: 1h.
INTERVAL=43200

# 1 = when the active keybox is revoked, automatically install a fresh valid one
#     and post a notification asking you to tap Apply.
# 0 = never write keybox.xml automatically; only notify that a refresh is due.
AUTO_INSTALL=1

# Google attestation revocation list (leaf-serial CRL). Leave as-is normally.
CRL_URL="https://android.googleapis.com/attestation/status"
